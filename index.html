<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's Day AR</title>
    
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      
      /* The Scanning Guide (The Hover Card) */
      #guide {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 60vw; height: 80vw;
        max-width: 300px; max-height: 400px;
        border: 4px dashed white;
        border-radius: 20px;
        z-index: 10;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.1);
      }
      
      .guide-text {
        color: white;
        font-family: sans-serif;
        font-weight: bold;
        text-align: center;
        text-shadow: 0 0 10px black;
      }

      .hidden { display: none !important; }
    </style>
  </head>

  <body>
    <div id="guide">
      <div class="guide-text">ALIGN CARD HERE</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiScanning: no; uiLoading: no; filterMinCF:0.001; filterBeta: 0.01;" 
      embedded 
      color-space="sRGB" 
      renderer="colorManagement: true; transparent: true; antialias: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <img id="flowerLeft" src="flower-left.png">
        <img id="flowerCentre" src="flower-centre.png">
        <img id="flowerRight" src="flower-right.png">
        <img id="messagePanel" src="message.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        
        <a-image id="img-center" src="#flowerCentre" 
                 position="0 0 0.1" 
                 scale="0 0 0"
                 material="shader: flat; transparent: true; alphaTest: 0.5;">
        </a-image>

        <a-image id="img-left" src="#flowerLeft" 
                 position="-0.4 -0.1 0.1" 
                 scale="0 0 0"
                 material="shader: flat; transparent: true; alphaTest: 0.5;">
        </a-image>

        <a-image id="img-right" src="#flowerRight" 
                 position="0.4 -0.1 0.1" 
                 scale="0 0 0"
                 material="shader: flat; transparent: true; alphaTest: 0.5;">
        </a-image>

        <a-image id="img-msg" src="#messagePanel" 
                 position="0 0.5 0.2" 
                 scale="0 0 0"
                 width="1.2" height="0.5"
                 material="shader: flat; transparent: true; alphaTest: 0.5;">
        </a-image>

      </a-entity>
    </a-scene>

    <script>
      const targetEntity = document.querySelector('#target');
      const guide = document.querySelector('#guide');
      
      // Grab all the image elements
      const imgs = [
        document.querySelector('#img-center'),
        document.querySelector('#img-left'),
        document.querySelector('#img-right'),
        document.querySelector('#img-msg')
      ];

      // When the card is spotted
      targetEntity.addEventListener("targetFound", () => {
        guide.classList.add('hidden'); // Remove the UI guide
        
        // Pop the images into view with a simple animation
        imgs.forEach((img, index) => {
          setTimeout(() => {
            img.setAttribute('animation', {
              property: 'scale',
              to: '1 1 1',
              dur: 600,
              easing: 'easeOutBack'
            });
          }, index * 150); // Staggered entrance
        });
      });

      // When the card is moved away
      targetEntity.addEventListener("targetLost", () => {
        guide.classList.remove('hidden'); // Bring back the guide
      });
    </script>
  </body>
</html>
