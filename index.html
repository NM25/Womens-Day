<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Women's Day AR Card</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="hint">Point your camera at the Women's Day card</div>

  <a-scene
    mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiScanning: yes; uiLoading: yes;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <img id="messagePanel" src="message.png" />
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-plane
        id="panel"
        src="#messagePanel"
        position="0.2 0.35 0"
        width="1.1"
        height="0.42"
        opacity="0"
        material="transparent: true; side: double"
        animation__fade="property: opacity; from: 0; to: 1; dur: 800; startEvents: showPanel"
        animation__rise="property: position; from: 0.2 0.2 0; to: 0.2 0.35 0; dur: 800; startEvents: showPanel"
      ></a-plane>
    </a-entity>
  </a-scene>

  <script>
    const target = document.querySelector("#target");
    const panel = document.querySelector("#panel");
    let started = false;

    target.addEventListener("targetFound", () => {
      if (started) return;
      started = true;
      panel.emit("showPanel");
    });

    target.addEventListener("targetLost", () => {
      started = false;
    });
  </script>
</body>
</html>
